<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindShield AI Status</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 20px;
      background: #0b0f19;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Outfit', 'Segoe UI', Roboto, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
    }
    .subtitle {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
    }
    .card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #34d399;
      font-variant-numeric: tabular-nums;
    }
    .value.locked {
      color: #f87171;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #1e293b;
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #10b981, #06b6d4);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 999px;
    }
    .footer {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      line-height: 1.5;
    }
    .status-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡️</div>
    <div>
      <div class="title">MindShield Companion</div>
      <div class="subtitle">Conscious Productivity Assistant</div>
    </div>
  </div>

  <div class="card">
    <div class="label" id="status-label">Active Session Time</div>
    <div class="value" id="status-value">00:00</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="status-badge" id="status-badge">● Protecting Focus</div>
  </div>

  <div class="footer">
    Synced with local SOC Dashboard.<br>Enforcing 60s Focus Threshold.
  </div>

  <script src="popup.js"></script>
</body>
</html>
